<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday, Hermosa 💕</title>
  <meta name="description" content="A little birthday surprise, made with love." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎂</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rose: #ff5e8a;
      --deep: #b03161;
      --ink: #5a2a45;
      --card: rgba(255, 255, 255, 0.78);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: "Quicksand", system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(-45deg, #ffdde1, #ee9ca7, #f7c1c9, #cba4ff, #ffd1ff);
      background-size: 400% 400%;
      animation: grad 18s ease infinite;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes grad {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating hearts layer */
    .hearts { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 1; }
    .hearts span {
      position: absolute;
      bottom: -48px;
      opacity: 0;
      animation: floatUp linear infinite;
      filter: drop-shadow(0 3px 6px rgba(176, 49, 97, 0.25));
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(0.7) rotate(0deg); opacity: 0; }
      12%  { opacity: 0.95; }
      88%  { opacity: 0.95; }
      100% { transform: translateY(-112vh) scale(1.15) rotate(25deg); opacity: 0; }
    }

    /* Confetti canvas */
    #confetti { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

    /* Screens */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 26px; overflow-y: auto;
      opacity: 0; visibility: hidden;
      transform: translateY(22px) scale(0.985);
      transition: opacity .7s ease, transform .7s cubic-bezier(.2,.8,.2,1), visibility .7s;
      z-index: 3;
    }
    .screen.active { opacity: 1; visibility: visible; transform: none; }

    .stack { margin: auto 0; }
    .stack > * { animation: rise .9s both; }
    .stack > *:nth-child(2) { animation-delay: .12s; }
    .stack > *:nth-child(3) { animation-delay: .24s; }
    .stack > *:nth-child(4) { animation-delay: .36s; }
    .stack > *:nth-child(5) { animation-delay: .48s; }
    .stack > *:nth-child(6) { animation-delay: .60s; }
    @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }

    .eyebrow {
      font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      font-size: 0.8rem; color: var(--deep); opacity: 0.85; margin-bottom: 10px;
    }

    .script {
      font-family: "Dancing Script", cursive;
      font-weight: 700;
      line-height: 1.05;
      color: var(--deep);
      font-size: clamp(2.6rem, 9vw, 5.2rem);
      text-shadow: 0 4px 18px rgba(176, 49, 97, 0.22);
    }

    .love {
      font-size: clamp(1.2rem, 4.5vw, 1.9rem);
      font-weight: 600; color: var(--ink); margin-top: 14px;
    }

    .badge {
      display: inline-block; margin-top: 26px;
      padding: 12px 26px; border-radius: 999px;
      background: linear-gradient(135deg, var(--rose), var(--deep));
      color: #fff; font-weight: 700; font-size: clamp(1rem, 3.6vw, 1.35rem);
      box-shadow: 0 10px 28px rgba(176, 49, 97, 0.4);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.05); }
    }

    /* Photo of us */
    .photo-wrap { margin-bottom: 16px; }
    .photo {
      display: block;
      width: clamp(210px, 64vw, 330px);
      height: auto;
      border-radius: 16px;
      border: 6px solid #fff;
      box-shadow: 0 14px 34px rgba(176, 49, 97, 0.34);
      transform: rotate(-2deg);
      animation: bob 5s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%      { transform: translateY(-7px) rotate(-2deg); }
    }

    .btn {
      cursor: pointer; border: none; font-family: inherit;
      font-weight: 700; color: #fff;
      background: linear-gradient(135deg, var(--rose), var(--deep));
      padding: 16px 34px; border-radius: 999px;
      font-size: clamp(1rem, 3.6vw, 1.2rem);
      box-shadow: 0 12px 26px rgba(176, 49, 97, 0.4);
      transition: transform .18s ease, box-shadow .18s ease;
      margin-top: 34px;
    }
    .btn:hover  { transform: translateY(-3px) scale(1.03); box-shadow: 0 16px 32px rgba(176, 49, 97, 0.48); }
    .btn:active { transform: translateY(0) scale(0.99); }

    .ghost {
      background: transparent; color: var(--deep);
      border: 2px solid var(--deep); box-shadow: none;
      padding: 12px 26px; font-size: 1rem; margin-top: 18px;
    }
    .ghost:hover { background: rgba(176, 49, 97, 0.08); box-shadow: none; transform: translateY(-2px); }

    .heading {
      font-family: "Dancing Script", cursive; font-weight: 700;
      color: var(--deep); line-height: 1.1;
      font-size: clamp(2.1rem, 7vw, 3.6rem);
    }
    .sub { margin-top: 8px; font-weight: 600; color: var(--ink); font-size: clamp(1rem, 4vw, 1.25rem); }

    /* Option grid */
    .options {
      display: grid; gap: 16px; margin-top: 30px; width: 100%;
      max-width: 560px;
      grid-template-columns: repeat(2, 1fr);
    }
    @media (max-width: 460px) { .options { grid-template-columns: 1fr; } }

    .option {
      cursor: pointer; border: none; font-family: inherit; text-align: left;
      background: var(--card); backdrop-filter: blur(8px);
      border-radius: 22px; padding: 20px 20px;
      box-shadow: 0 10px 26px rgba(176, 49, 97, 0.18);
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
      display: flex; align-items: center; gap: 14px;
    }
    .option:hover { transform: translateY(-4px); box-shadow: 0 16px 34px rgba(176, 49, 97, 0.28); }
    .option:active { transform: translateY(-1px) scale(0.99); }
    .option .emoji { font-size: 2rem; line-height: 1; }
    .option .num {
      font-family: "Dancing Script", cursive; font-weight: 700;
      color: var(--rose); font-size: 1.1rem; margin-right: 2px;
    }
    .option .name { font-weight: 700; color: var(--ink); font-size: 1.15rem; }
    .option .tag { font-weight: 500; color: var(--deep); opacity: 0.8; font-size: 0.85rem; }

    /* You-pick form */
    .pick-form {
      margin-top: 18px; width: 100%; max-width: 560px;
      display: none; flex-direction: column; gap: 12px; align-items: center;
    }
    .pick-form.show { display: flex; animation: rise .5s both; }
    .pick-form input {
      width: 100%; padding: 15px 18px; border-radius: 16px;
      border: 2px solid rgba(176, 49, 97, 0.35);
      font-family: inherit; font-size: 1rem; color: var(--ink);
      background: rgba(255,255,255,0.9); outline: none;
      transition: border-color .18s ease;
    }
    .pick-form input:focus { border-color: var(--rose); }

    /* Celebration */
    .card-note {
      background: var(--card); backdrop-filter: blur(8px);
      border-radius: 26px; padding: 30px 26px; max-width: 540px;
      box-shadow: 0 16px 40px rgba(176, 49, 97, 0.22);
    }
    .choice-line {
      font-family: "Dancing Script", cursive; font-weight: 700;
      color: var(--deep); font-size: clamp(1.9rem, 7vw, 3.2rem); line-height: 1.1;
    }
    .note-body { margin-top: 14px; font-weight: 500; font-size: clamp(1rem, 4vw, 1.18rem); line-height: 1.6; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 26px; }
    .btn-row .btn, .btn-row .ghost { margin-top: 0; }

    .footnote { margin-top: 22px; font-size: 0.8rem; color: var(--deep); opacity: 0.7; }

    /* Music toggle */
    .music-toggle {
      position: fixed; right: 16px; bottom: 16px; z-index: 6;
      display: inline-flex; align-items: center; gap: 8px;
      border: none; cursor: pointer; font-family: inherit; font-weight: 700;
      color: #fff; background: linear-gradient(135deg, var(--rose), var(--deep));
      padding: 12px 16px; border-radius: 999px;
      box-shadow: 0 10px 24px rgba(176, 49, 97, 0.4);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .music-toggle:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(176, 49, 97, 0.5); }
    .music-toggle .mt-icon { font-size: 1.15rem; line-height: 1; }
    .music-toggle .mt-label { font-size: 0.85rem; white-space: nowrap; }
    .music-toggle.playing { animation: pulse 1.6s ease-in-out infinite; }
    .music-toggle.playing .mt-label { display: none; }
    @media (max-width: 380px) { .music-toggle .mt-label { display: none; } }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <div class="hearts" id="hearts" aria-hidden="true"></div>

  <!-- Our song (drop your file at assets/song.mp3). Starts on the first tap. -->
  <audio id="song" src="assets/song.mp3" loop preload="auto"></audio>
  <button id="musicToggle" class="music-toggle" type="button" aria-label="Play the song">
    <span class="mt-icon">🎵</span>
    <span class="mt-label">Tap for our song</span>
  </button>

  <!-- ───────────── SPLASH ───────────── -->
  <section class="screen active" id="splash" aria-label="Birthday greeting">
    <div class="stack">
      <div class="photo-wrap" id="photoWrap">
        <img class="photo" src="assets/us.jpg" alt="Us together 💕"
             onerror="this.closest('.photo-wrap').style.display='none'" />
      </div>
      <p class="eyebrow">June 19 · It's finally your day 🎂</p>
      <h1 class="script">Happy Birthday,<br />Hermosa</h1>
      <p class="love">I love you so much 💗</p>
      <span class="badge">🎉 Happy 22nd Birthday! 🎉</span>
      <div>
        <button class="btn" id="openBtn">Open your surprise 🎁</button>
      </div>
    </div>
  </section>

  <!-- ───────────── MAIN / PICKER ───────────── -->
  <section class="screen" id="main" aria-label="Choose where to go">
    <div class="stack" style="width:100%; display:flex; flex-direction:column; align-items:center;">
      <p class="eyebrow">Your birthday, your call 💕</p>
      <h2 class="heading">Where do you wanna go,<br />mi amor?</h2>
      <p class="sub">Pick the spot — I'm taking you out 🥰</p>

      <div class="options" id="options">
        <button class="option" data-choice="Cheddar's">
          <span class="emoji">🍽️</span>
          <span><span class="num">1.</span> <span class="name">Cheddar's</span><br /><span class="tag">comfort food date</span></span>
        </button>
        <button class="option" data-choice="Bobo's">
          <span class="emoji">🍤</span>
          <span><span class="num">2.</span> <span class="name">Bobo's</span><br /><span class="tag">let's gooo 😋</span></span>
        </button>
        <button class="option" data-choice="Fort Bliss">
          <span class="emoji">🌅</span>
          <span><span class="num">3.</span> <span class="name">Fort Bliss</span><br /><span class="tag">a day out together</span></span>
        </button>
        <button class="option" id="youPick">
          <span class="emoji">💭</span>
          <span><span class="num">4.</span> <span class="name">You pick</span><br /><span class="tag">anywhere your heart wants</span></span>
        </button>
      </div>

      <form class="pick-form" id="pickForm">
        <input id="pickInput" type="text" placeholder="Type the place you want to go… ✨" maxlength="80" autocomplete="off" />
        <button class="btn" type="submit">That's the one 💖</button>
      </form>
    </div>
  </section>

  <!-- ───────────── CELEBRATION ───────────── -->
  <section class="screen" id="celebrate" aria-label="Your choice">
    <div class="stack">
      <div class="card-note">
        <p class="choice-line" id="choiceLine">Yay! 🥳</p>
        <p class="note-body" id="noteBody"></p>
      </div>
      <div class="btn-row">
        <a class="btn" id="tellBtn" href="#">Let Dorian know 💌</a>
        <button class="ghost" id="againBtn">Pick again 🔁</button>
      </div>
      <p class="footnote">Made with all my love, just for you. — Dorian 💕</p>
    </div>
  </section>

  <script>
    /* ---------- Floating hearts ---------- */
    (function () {
      const layer = document.getElementById('hearts');
      const emojis = ['💕','💖','💗','💞','🌸','✨','🎀'];
      const count = window.innerWidth < 600 ? 14 : 22;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('span');
        s.textContent = emojis[i % emojis.length];
        s.style.left = (Math.random() * 100) + 'vw';
        s.style.fontSize = (14 + Math.random() * 26) + 'px';
        s.style.animationDuration = (7 + Math.random() * 9) + 's';
        s.style.animationDelay = (Math.random() * 10) + 's';
        layer.appendChild(s);
      }
    })();

    /* ---------- Confetti ---------- */
    const confetti = (function () {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      const colors = ['#ff5e8a','#ffd93d','#ff9a9e','#a18cd1','#fbc2eb','#84fab0','#ffffff'];
      let pieces = [], raf = null;
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize); resize();
      function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.rot += p.vr;
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
          ctx.fillStyle = p.c; ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
          ctx.restore();
        });
        pieces = pieces.filter(p => p.y < canvas.height + 40);
        if (pieces.length) { raf = requestAnimationFrame(loop); }
        else { raf = null; ctx.clearRect(0, 0, canvas.width, canvas.height); }
      }
      return function burst() {
        for (let i = 0; i < 180; i++) {
          pieces.push({
            x: Math.random() * canvas.width,
            y: -20 - Math.random() * canvas.height * 0.35,
            r: 6 + Math.random() * 9,
            c: colors[Math.floor(Math.random() * colors.length)],
            vx: -2.5 + Math.random() * 5,
            vy: 2 + Math.random() * 4.5,
            rot: Math.random() * Math.PI,
            vr: -0.25 + Math.random() * 0.5
          });
        }
        if (!raf) loop();
      };
    })();

    /* ---------- Music ("Girls Love Beyoncé" — add file at assets/song.mp3) ---------- */
    const song = document.getElementById('song');
    const musicToggle = document.getElementById('musicToggle');
    const mtIcon = musicToggle.querySelector('.mt-icon');

    function fadeIn() {
      song.volume = 0;
      const id = setInterval(() => {
        song.volume = Math.min(song.volume + 0.05, 0.7);
        if (song.volume >= 0.7) clearInterval(id);
      }, 120);
    }
    function playSong() { song.play().then(fadeIn).catch(() => {}); }

    song.addEventListener('play', () => {
      musicToggle.classList.add('playing');
      mtIcon.textContent = '🔊';
      musicToggle.setAttribute('aria-label', 'Pause the song');
    });
    song.addEventListener('pause', () => {
      musicToggle.classList.remove('playing');
      mtIcon.textContent = '🎵';
      musicToggle.setAttribute('aria-label', 'Play the song');
    });
    musicToggle.addEventListener('click', () => {
      if (song.paused) playSong(); else song.pause();
    });

    /* ---------- Screen routing ---------- */
    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    document.getElementById('openBtn').addEventListener('click', () => {
      playSong();          // first real tap → song is allowed to start
      confetti();
      show('main');
    });

    /* ---------- "You pick" reveal ---------- */
    const pickForm = document.getElementById('pickForm');
    document.getElementById('youPick').addEventListener('click', () => {
      pickForm.classList.add('show');
      document.getElementById('pickInput').focus();
    });
    pickForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const val = document.getElementById('pickInput').value.trim();
      celebrate(val ? val : "wherever you want", !val);
    });

    /* ---------- Option choice ---------- */
    document.querySelectorAll('.option[data-choice]').forEach(btn => {
      btn.addEventListener('click', () => celebrate(btn.dataset.choice, false));
    });

    /* ---------- Celebration ---------- */
    function celebrate(place, openEnded) {
      const choiceLine = document.getElementById('choiceLine');
      const noteBody = document.getElementById('noteBody');

      if (openEnded) {
        choiceLine.textContent = "Anywhere you want 💕";
        noteBody.textContent = "Seriously — name it and that's where we're going. As long as I'm with you, it's the best day ever. Happy 22nd birthday, hermosa. I love you so much. 🥰";
      } else {
        choiceLine.textContent = place + " it is! 🥳";
        noteBody.textContent = "Perfect choice. Get ready, because I'm taking you to " + place + " for your birthday. I can't wait to spoil you, hermosa. I love you more than words. 💗";
      }

      /* Pre-fill the "let Dorian know" email */
      const subject = encodeURIComponent("My birthday pick! 💕");
      const body = encodeURIComponent(
        (openEnded ? "I'll let you surprise me 😜" : "I wanna go to " + place + " for my birthday!") +
        "\n\nThank you for my website, I love you 💖"
      );
      document.getElementById('tellBtn').href =
        "mailto:dorianjamesacosta@gmail.com?subject=" + subject + "&body=" + body;

      show('celebrate');
      confetti();
      setTimeout(confetti, 600);
    }

    /* ---------- Pick again ---------- */
    document.getElementById('againBtn').addEventListener('click', () => {
      pickForm.classList.remove('show');
      document.getElementById('pickInput').value = '';
      show('main');
    });
  </script>
</body>
</html>
